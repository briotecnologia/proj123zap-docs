name: Deploy Docs to CloudFront

on:
  push:
    branches:
      - master
    paths:
      - "docs/**"
      - "scripts/**"
      - ".github/workflows/deploy-cloudfront.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      DOCS_S3_BUCKET: ${{ vars.DOCS_S3_BUCKET }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required configuration
        run: |
          test -n "$AWS_REGION" || (echo "Missing repo variable AWS_REGION" && exit 1)
          test -n "$DOCS_S3_BUCKET" || (echo "Missing repo variable DOCS_S3_BUCKET" && exit 1)
          test -n "$CLOUDFRONT_DISTRIBUTION_ID" || (echo "Missing repo variable CLOUDFRONT_DISTRIBUTION_ID" && exit 1)
          test -n "${{ secrets.AWS_ROLE_TO_ASSUME }}" || (echo "Missing secret AWS_ROLE_TO_ASSUME" && exit 1)

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-proj123zap-docs

      - name: Upload static assets (long cache)
        run: |
          aws s3 sync docs "s3://${DOCS_S3_BUCKET}" \
            --delete \
            --exclude "*.html" \
            --cache-control "public,max-age=31536000,immutable"

      - name: Upload HTML (no cache)
        run: |
          aws s3 sync docs "s3://${DOCS_S3_BUCKET}" \
            --exclude "*" \
            --include "*.html" \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "/*"

